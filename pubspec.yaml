name: bakahyou
description: "BakaHyou is an app for MangaBaka"
publish_to: 'none'
version: 1.0.0+1


environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.5
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.3.2
  intl: ^0.20.2
  share_plus: ^13.0.0
  flutter_dotenv: ^6.0.0
  flutter_appauth: ^12.0.0
  flutter_secure_storage: ^8.1.0
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  sqlite3: ^3.3.1
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.6.0+eol
  logging: ^1.3.0
  get_it: ^7.6.0
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/mangabaka512.png"
  adaptive_icon_foreground: "assets/mangabaka512.png"

flutter:
  assets:
    - .env
  uses-material-design: true
