name: Build and Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze-and-test:
    name: Analyze and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env File
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        shell: bash
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env
          else
            echo "" > .env
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze --fatal-warnings --fatal-infos

      - name: Run Tests
        run: flutter test

  build-android:
    name: Build Android
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env File
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        shell: bash
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env
          else
            echo "" > .env
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Set up Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build APKs
        shell: bash
        run: |
          set -euo pipefail

          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)

          flutter build apk --release --split-per-abi

          shopt -s nullglob
          APK_FILES=(build/app/outputs/flutter-apk/app-*-release.apk)
          shopt -u nullglob
          if [ "${#APK_FILES[@]}" -eq 0 ]; then
            echo "No split APKs found in build/app/outputs/flutter-apk/. Check the Flutter build logs above and verify the project still supports ABI split APK output."
            exit 1
          fi

          for APK in "${APK_FILES[@]}"; do
            FILE_NAME=$(basename "$APK")
            ABI=${FILE_NAME#app-}
            ABI=${ABI%-release.apk}
            cp "$APK" "android-mangabaka-app-v${VERSION_CLEAN}-${ABI}.apk"
          done
        env:
          ANDROID_KEYSTORE_PATH: upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: android-mangabaka-app-v*.apk

  build-windows:
    name: Build Windows
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env File
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        shell: bash
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env
          else
            echo "" > .env
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: flutter build windows --release

      - name: Build Inno Setup Installer
        shell: pwsh
        run: |
          # Extract clean version from pubspec.yaml
          $versionLine = Get-Content pubspec.yaml | Select-String "^version:"
          $versionFull = ($versionLine -split " ")[1].Trim()
          $versionClean = ($versionFull -split "\+")[0]

          # Compile Inno Setup Script
          iscc /DAppVersion=$versionClean windows_installer.iss

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: windows-mangabaka-app-v*.exe

  build-macos:
    name: Build macOS
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Match the iOS job on Xcode 26.x so both Apple builds use a current SDK
      # (Apple mandates Xcode 26 for App Store submissions as of 2026).
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create .env File
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        shell: bash
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env
          else
            echo "" > .env
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Import macOS Certificates
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        if: ${{ env.MACOS_CERTIFICATE_BASE64 != '' }}
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Build macOS Application
        run: flutter build macos --release

      - name: Fix Permissions and Apply Ad-Hoc Code Signing
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1)
          if [ -n "$APP_PATH" ]; then
            echo "Found compiled app at: $APP_PATH"
            # 1. Clear any broken quarantine or attribute flags from the build
            xattr -cr "$APP_PATH"
            # 2. Grant executable permissions recursively to the bundle
            chmod -R +x "$APP_PATH"
            # 3. Sign all nested .dylib files individually
            find "$APP_PATH" -name "*.dylib" | while read -r dylib; do
                echo "Signing dylib: $dylib"
                codesign --force --sign - "$dylib"
            done
            # 4. Sign all nested .framework bundles depth-first
            find "$APP_PATH" -name "*.framework" -depth | while read -r framework; do
                echo "Signing framework: $framework"
                codesign --force --sign - "$framework"
            done
            # 5. Sign the main executable binary
            echo "Signing main executable binary..."
            codesign --force --sign - "$APP_PATH/Contents/MacOS/MangaBaka"
            # 6. Sign the top-level application bundle wrapper container
            echo "Signing top-level bundle wrapper..."
            codesign --force --sign - "$APP_PATH"
          else
            echo "Error: Application bundle (.app) not found in build directory!"
            exit 1
          fi

      - name: Package and Compress App Bundle
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)

          # Find the built .app bundle
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1)
          
          # Create DMG
          APP_NAME=$(basename "$APP_PATH" .app)
          mkdir -p build/macos/Release temp_dir
          cp -R "$APP_PATH" temp_dir/
          ln -s /Applications temp_dir/Applications
          hdiutil create -volname "$APP_NAME" -srcfolder temp_dir -ov -format UDZO "build/macos/Release/macos-mangabaka-app-v${VERSION_CLEAN}.dmg"
          rm -rf temp_dir

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: |
            macos-mangabaka-app-v*.zip
            build/macos/Release/macos-mangabaka-app-v*.dmg

  build-ios:
    name: Build iOS
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # device_info_plus 13.1.0 references the iOS 26.1 selector `isiOSAppOnVision`,
      # which is only declared in the iOS 26.1+ SDK. The macos-latest default Xcode
      # (16.x, iOS 18 SDK) can't compile it, so pin to the latest stable Xcode 26.x.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create .env File
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        shell: bash
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env
          else
            echo "" > .env
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Import iOS Certificates
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        if: ${{ env.IOS_CERTIFICATE_BASE64 != '' }}
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Build iOS Archive
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$IOS_CERTIFICATE_BASE64" ]; then
            flutter build ipa --release
          else
            flutter build ipa --release --no-codesign
          fi

      - name: Package iOS Artifact
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)

          if [ -d "build/ios/ipa" ]; then
            ipa_file=$(find build/ios/ipa -name "*.ipa" | head -n 1)
            if [ -n "$ipa_file" ]; then
              cp "$ipa_file" "$GITHUB_WORKSPACE/ios-mangabaka-app-v${VERSION_CLEAN}.ipa"
              echo "Packaged IPA"
            fi
          else
            xcarchive_path=$(find build/ios/archive -name "*.xcarchive" | head -n 1)
            if [ -n "$xcarchive_path" ]; then
              cd "$(dirname "$xcarchive_path")"
              zip -r "$GITHUB_WORKSPACE/ios-mangabaka-app-v${VERSION_CLEAN}.xcarchive.zip" "$(basename "$xcarchive_path")"
              cd -
              echo "Packaged Unsigned xcarchive zip"
            fi
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifact
          path: |
            ios-mangabaka-app-v*.ipa
            ios-mangabaka-app-v*.xcarchive.zip

  build-ios-sideload:
    name: Build iOS (Sideload IPA)
    needs: analyze-and-test
    runs-on: macos-latest
    env:
      ZSIGN_VERSION: "0.7"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create .env File
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        shell: bash
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env
          else
            echo "" > .env
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Unsigned iOS App
        run: flutter build ios --release --no-codesign

      - name: Package and Sign Sideload IPA
        env:
          P12_BASE64: ${{ secrets.SIDELOAD_P12_CERTIFICATE }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.SIDELOAD_PROVISIONING_PROFILE }}
          P12_PASSWORD: ${{ secrets.SIDELOAD_P12_PASSWORD }}
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)

          mkdir -p build/ios/iphoneos/Payload
          ln -s ../Runner.app build/ios/iphoneos/Payload/Runner.app

          if [ -n "$P12_BASE64" ] && [ -n "$PROVISIONING_PROFILE_BASE64" ] && [ -n "$P12_PASSWORD" ]; then
            echo "$P12_BASE64" | base64 --decode > certificate.p12
            echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
            curl -sL -o zsign.zip "https://github.com/zhlynn/zsign/releases/download/v${ZSIGN_VERSION}/zsign-v${ZSIGN_VERSION}-macos-x64.zip"
            unzip -q zsign.zip
            chmod +x zsign || chmod +x zsign-*
            if [ -f "./zsign" ]; then
              ZSIGN_EXEC="./zsign"
            else
              ZSIGN_EXEC=$(ls zsign* 2>/dev/null | head -n 1)
            fi
            $ZSIGN_EXEC -f -k ./certificate.p12 -p "$P12_PASSWORD" -m ./profile.mobileprovision ./build/ios/iphoneos/Payload/Runner.app
          else
            echo "⚠️ No sideload signing secrets provided — building unsigned .ipa"
          fi

          cd build/ios/iphoneos
          zip -qr "$GITHUB_WORKSPACE/ios-mangabaka-app-v${VERSION_CLEAN}-sideload.ipa" Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-sideload-artifact
          path: ios-mangabaka-app-v*-sideload.ipa

  build-linux:
    name: Build Linux
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env File
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        shell: bash
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env
          else
            echo "" > .env
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build cmake maven clang mpv libgtk-3-dev \
            libblkid-dev liblzma-dev pkg-config libmpv-dev webkit2gtk-4.1 fuse rpm
          wget -qO appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool && sudo mv appimagetool /usr/local/bin/

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Linux Application
        run: flutter build linux --release

      - name: Package AppImage
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)

          # Create AppDir structure
          rm -rf AppDir && mkdir -p AppDir/usr/{bin,share/icons/hicolor/256x256/apps,lib}
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          
          # Copy icon if exists
          if [ -f "assets/images/logo.png" ]; then
            cp assets/images/logo.png AppDir/usr/share/icons/hicolor/256x256/apps/mangabaka.png
            cp assets/images/logo.png AppDir/mangabaka.png
          fi

          # Create desktop file
          cat > AppDir/mangabaka.desktop << 'EOF'
          [Desktop Entry]
          Name=MangaBaka
          Exec=usr/bin/mangabaka
          Icon=mangabaka
          Type=Application
          Categories=Utility;
          EOF

          # Create AppRun script
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin/:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib/:${HERE}/usr/lib/:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/mangabaka" "$@"
          EOF
          chmod +x AppDir/AppRun

          # Build AppImage
          /usr/local/bin/appimagetool AppDir
          mv MangaBaka-x86_64.AppImage "build/linux/x64/release/linux-mangabaka-app-v${VERSION_CLEAN}.AppImage"

      - name: Package RPM
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)

          mkdir -p rpm_build/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp -r build/linux/x64/release/bundle rpm_build/SOURCES/mangabaka-${VERSION_CLEAN}
          tar czf rpm_build/SOURCES/mangabaka-${VERSION_CLEAN}.tar.gz -C rpm_build/SOURCES mangabaka-${VERSION_CLEAN}
          
          mkdir -p rpm_build/SOURCES/usr/share/icons/hicolor/256x256/apps
          if [ -f "assets/images/logo.png" ]; then
            cp assets/images/logo.png rpm_build/SOURCES/usr/share/icons/hicolor/256x256/apps/mangabaka.png
          fi

          cat > rpm_build/SPECS/mangabaka.spec << EOF
          Name: mangabaka
          Version: ${VERSION_CLEAN}
          Release: 1%{?dist}
          Summary: MangaBaka - A manga reader application
          License: MIT
          Source0: %{name}-%{version}.tar.gz
          BuildArch: x86_64
          %description
          MangaBaka is a Flutter-based manga reader application.
          %prep
          %setup -q
          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/applications
          mkdir -p %{buildroot}/usr/share/icons/hicolor/256x256/apps
          cp -r * %{buildroot}/usr/bin/
          cp -r %{_sourcedir}/usr/share/* %{buildroot}/usr/share/
          cat > %{buildroot}/usr/share/applications/mangabaka.desktop << 'EOL'
          [Desktop Entry]
          Name=MangaBaka
          Exec=/usr/bin/mangabaka
          Icon=mangabaka
          Type=Application
          Categories=Utility;
          EOL
          %files
          /usr/bin/*
          /usr/share/applications/mangabaka.desktop
          /usr/share/icons/hicolor/256x256/apps/mangabaka.png
          EOF

          rpmbuild --define "_topdir $(pwd)/rpm_build" -ba rpm_build/SPECS/mangabaka.spec
          mv rpm_build/RPMS/x86_64/*.rpm "build/linux/x64/release/linux-mangabaka-app-v${VERSION_CLEAN}.rpm"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: |
            build/linux/x64/release/linux-mangabaka-app-v*.AppImage
            build/linux/x64/release/linux-mangabaka-app-v*.rpm

  create-draft-release:
    name: Create Draft Release
    needs: [build-android, build-windows, build-macos, build-ios, build-ios-sideload, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Release Version
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_FULL=$(echo "$VERSION_LINE" | cut -d' ' -f2)
          VERSION_CLEAN=$(echo "$VERSION_FULL" | cut -d'+' -f1)
          echo "VERSION_CLEAN=$VERSION_CLEAN" >> $GITHUB_ENV

      - name: Download Built Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION_CLEAN}" release-artifacts/* \
            --title "MangaBaka App v${VERSION_CLEAN}" \
            --draft \
            --notes "Draft release for version v${VERSION_CLEAN}."
